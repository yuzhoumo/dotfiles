# variables
$fileManager = nautilus
$menu = rofi -show drun -show-icons -theme ~/.config/rofi/catppuccin-default.rasi
$mod = SUPER
$terminal = kitty

monitor = eDP-1,2560x1600@90,auto,1.666667 # built-in display
monitor = ,preferred,auto,1                # external monitors

xwayland {
    force_zero_scaling = true
}

env = NIXOS_OZONE_WL,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_SCALE,2

env = XCURSOR_THEME,macOS
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# startup commands
exec-once = dconf write /org/gnome/desktop/interface/color-scheme "'prefer-dark'"
exec-once = hyprpaper --config ~/.config/hypr/hyprpaper.conf
exec-once = hyprctl setcursor macOS 24
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = mako --config /etc/xdg/mako/config
exec-once = swayosd-server

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
        tap-to-click = true
    }
}

gesture = 3, horizontal, workspace

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# app launchers
bind = $mod, Return, exec, $terminal
bind = $mod, SPACE, exec, $menu
bind = $mod, E, exec, $fileManager

# window management
bind = $mod, Q, killactive
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen
bind = $mod, P, pseudo
bind = $mod, T, layoutmsg, togglesplit

# screenshots (save to ~/Desktop)
bind = $mod SHIFT, 3, exec, mkdir -p ~/Desktop && grim ~/Desktop/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot saved" "Fullscreen screenshot saved to ~/Desktop"
bind = $mod SHIFT, 4, exec, mkdir -p ~/Desktop && grim -g "$(slurp)" ~/Desktop/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot saved" "Area screenshot saved to ~/Desktop"

# volume control (swayosd provides macos-style visual overlay)
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# media keys
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# brightness (swayosd provides macos-style visual overlay)
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# move to workspace
bind = ALT, 1, movetoworkspace, 1
bind = ALT, 2, movetoworkspace, 2
bind = ALT, 3, movetoworkspace, 3
bind = ALT, 4, movetoworkspace, 4
bind = ALT, 5, movetoworkspace, 5

# special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# swipe through workspaces
bind = CTRL, right, workspace, e+1
bind = CTRL, left, workspace, e-1

# mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
